name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit hooks
        uses: j178/prek-action@v1.1.1
        with:
          extra-args: --all-files

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest --cov --cov-report=xml --ignore=tests/test_integration.py

  integration:
    runs-on: ubuntu-latest
    env:
      ORT_VERSION: "1.23.0"
      SURREALDB_URL: "ws://localhost:8000"
    services:
      surrealdb:
        image: rinatshay/surrealdb-service:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -sf http://localhost:8000/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6

      - name: Install ONNX Runtime
        run: |
          curl -sL -o /tmp/ort.tgz "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xzf /tmp/ort.tgz
          sudo cp onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION} /usr/local/lib/libonnxruntime.so
          sudo ldconfig

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests
        run: uv run pytest tests/test_integration.py -v -m integration
